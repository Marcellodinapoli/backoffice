# BackOffice Flutter Web — deploy Netlify
# Publish directory: build/web (generato da flutter build web)

[build]
  command = "bash scripts/netlify_build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_CHANNEL = "stable"

# Flutter web SPA: tutte le route → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
