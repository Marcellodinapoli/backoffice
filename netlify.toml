# BackOffice Flutter Web — deploy Netlify
#
# In Netlify UI (Site configuration → Build & deploy) imposta:
#   Build command:  (lascia vuoto per usare questo file)
#   Publish directory: build/web
#   Branch: main
#
# Su Windows (locale, senza bash):
#   powershell -ExecutionPolicy Bypass -File .\scripts\netlify_build.ps1
#   powershell -ExecutionPolicy Bypass -File .\scripts\deploy_netlify_local.ps1

[build]
  command = "bash scripts/netlify_build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_CHANNEL = "stable"
  # Evita warning analytics in CI
  CI = "true"

# Flutter web SPA: tutte le route → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
