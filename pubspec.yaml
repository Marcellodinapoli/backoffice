name: backoffice
description: Backoffice di gestione per CreditPlanet
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0

  credit_calc_core:
    path: ../creditplanet/packages/credit_calc_core

  # Firebase (allineato a credit_calc_core)
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_storage: ^13.4.3

  # 🔹 Selettore file (>=8.0.7 risolve warning inline implementation)
  file_picker: ^8.0.7

  # 🔹 Apertura link cross-platform (Web, Desktop, Mobile)
  url_launcher: ^6.3.1

  # 🔹 Biometria (solo Android/iOS/Windows/macOS)
  local_auth: ^2.3.0

  # 🔹 HTTP per notifiche push e API esterne
  http: ^1.2.1

  # 🔹 Lettura file Excel (.xlsx) per i quiz
  excel: ^4.0.6

  # 🔹 PDF export
  pdf: ^3.10.0

  # 🔹 Rendering Markdown per regolamenti e testi formattati
  flutter_markdown: ^0.7.4

  intl: ^0.19.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/