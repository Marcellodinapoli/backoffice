# Pubblica su https://backofficeadmin.netlify.app ad ogni push su main.
#
# Configura UNO dei due metodi (GitHub → repo → Settings → Secrets → Actions):
#
# Metodo A (consigliato, 1 secret):
#   NETLIFY_BUILD_HOOK
#   Netlify → sito backofficeadmin → Build & deploy → Build hooks → Add build hook
#   → copia l'URL e incollalo come secret
#
# Metodo B (2 secrets):
#   NETLIFY_AUTH_TOKEN  → Netlify → User settings → Applications → token
#   NETLIFY_SITE_ID     → backofficeadmin → Site details → API ID
name: Deploy Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verifica configurazione Netlify
        id: cfg
        env:
          HAS_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
          HAS_CLI: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        run: |
          if [ "$HAS_CLI" = "true" ]; then
            echo "method=cli" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_HOOK" = "true" ]; then
            echo "method=hook" >> "$GITHUB_OUTPUT"
          else
            echo "method=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Secrets Netlify mancanti
        if: steps.cfg.outputs.method == 'none'
        run: |
          echo "::error::Configura almeno un secret su GitHub (Settings → Secrets → Actions):"
          echo "  NETLIFY_BUILD_HOOK  — da backofficeadmin → Build hooks (1 secret, consigliato)"
          echo "  oppure NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID"
          exit 1

      # --- Metodo A: build su GitHub Actions + upload su backofficeadmin ---
      - uses: subosito/flutter-action@v2
        if: steps.cfg.outputs.method == 'cli'
        with:
          channel: stable
          cache: true

      - name: Build web
        if: steps.cfg.outputs.method == 'cli'
        run: |
          flutter config --enable-web --no-analytics
          flutter pub get
          flutter build web --release
          test -f build/web/index.html

      - uses: actions/setup-node@v4
        if: steps.cfg.outputs.method == 'cli'
        with:
          node-version: 22

      - name: Deploy to Netlify (CLI)
        if: steps.cfg.outputs.method == 'cli'
        run: npx --yes netlify-cli deploy --prod --dir=build/web
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # --- Metodo B: avvia build su Netlify (repo + netlify.toml) ---
      - name: Trigger build su backofficeadmin
        if: steps.cfg.outputs.method == 'hook'
        run: |
          curl -fsSL -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Build avviato su Netlify (backofficeadmin.netlify.app)"
