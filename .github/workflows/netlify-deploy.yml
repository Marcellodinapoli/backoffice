# Pubblica su https://backofficeadmin.netlify.app ad ogni push su main.
#
# Serve UNO dei due metodi (GitHub → repo → Settings → Secrets → Actions):
#
# Metodo A (1 secret): NETLIFY_BUILD_HOOK
#   Netlify → backofficeadmin → Build & deploy → Build hooks → Add build hook (branch main)
#
# Metodo B (2 secrets): NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
#   Token: Netlify → User settings → Applications
#   Site ID: backofficeadmin → Site details → API ID
#
# Se Netlify è già collegato al repo GitHub con build automatico, questo workflow è opzionale.
name: Deploy Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verifica configurazione Netlify
        id: cfg
        env:
          HAS_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
          HAS_CLI: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        run: |
          if [ "$HAS_CLI" = "true" ]; then
            echo "method=cli" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_HOOK" = "true" ]; then
            echo "method=hook" >> "$GITHUB_OUTPUT"
          else
            echo "method=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Secrets Netlify mancanti
        if: steps.cfg.outputs.method == 'none'
        run: |
          echo "::error::Configura almeno un secret su GitHub (Settings → Secrets → Actions):"
          echo "  NETLIFY_BUILD_HOOK  — da backofficeadmin → Build hooks (1 secret, consigliato)"
          echo "  oppure NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID"
          exit 1

      - uses: subosito/flutter-action@v2
        if: steps.cfg.outputs.method == 'cli'
        with:
          channel: stable
          cache: true

      - name: Build web
        if: steps.cfg.outputs.method == 'cli'
        run: |
          flutter config --enable-web --no-analytics
          flutter pub get
          flutter build web --release
          test -f build/web/index.html

      - name: Deploy to Netlify (API zip)
        if: steps.cfg.outputs.method == 'cli'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          echo "==> Verifica token e site ID..."
          HTTP_CODE=$(curl -sS -o /tmp/netlify-site.json -w "%{http_code}" \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Netlify API HTTP ${HTTP_CODE}. Rigenera NETLIFY_AUTH_TOKEN (Netlify → User settings → Applications)."
            cat /tmp/netlify-site.json || true
            exit 1
          fi
          echo "==> Crea zip da build/web..."
          (cd build/web && zip -r9q ../../site.zip .)
          echo "==> Upload produzione..."
          HTTP_CODE=$(curl -sS -o /tmp/netlify-deploy.json -w "%{http_code}" \
            -H "Content-Type: application/zip" \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            --data-binary "@site.zip" \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Deploy Netlify fallito HTTP ${HTTP_CODE}"
            cat /tmp/netlify-deploy.json || true
            exit 1
          fi
          echo "==> Deploy OK su backofficeadmin.netlify.app"
          cat /tmp/netlify-deploy.json

      - name: Trigger build su backofficeadmin
        if: steps.cfg.outputs.method == 'hook'
        run: |
          curl -fsSL -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Build avviato su Netlify (backofficeadmin.netlify.app)"
